<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Sewaa — Change Region</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="app.html" class="brand">Free Sewaa</a>
      <nav class="main-nav">
        <a href="app.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About Us</a>
        <a href="donate.html" class="nav-link">Donate</a>
        <a href="browse.html" class="nav-link">Browse</a>
        <a href="donate-us.html" class="nav-link">Donate Us</a>
      </nav>
      <div class="header-actions">
        <div class="settings-dropdown">
          <button class="icon-link settings-trigger active-link" type="button"><span class="icon-gear">⚙</span></button>
          <div class="settings-menu">
            <a href="profile.html">Profile</a>
            <a href="region.html">Change Region</a>
            <a href="logout.html">Logout</a>
          </div>
        </div>
      </div>
    </div>
  </header>

<main>
  <section class="page-hero generic-hero">
    <div class="page-hero__bg region-hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="page-hero__content wrap">
      <div>
        <p class="eyebrow">LOCATION SETTINGS</p>
        <h1 class="page-title">Change your<br>region.</h1>
        <p class="page-text">Select a city or area to improve nearby results.</p>
      </div>
    </div>
  </section>

  <section class="content-grid wrap">
    <article class="panel reveal-card">
      <p class="eyebrow">CURRENT REGION</p>
      <h2 class="section-title small">Brampton, Ontario</h2>
      <p class="section-text">Your current region controls nearby browse results.</p>
    </article>
    <article class="panel reveal-card">
      <p class="eyebrow">CHANGE REGION</p>
      <form class="premium-form">
        <label class="field">
          <span>Select region</span>
          <select>
            <option>Brampton</option>
            <option>Mississauga</option>
            <option>Toronto</option>
            <option>North York</option>
          </select>
        </label>
        <div class="form-actions">
          <button class="btn btn-hero" type="submit">Update Region</button>
        </div>
      </form>
    </article>
  </section>
</main>

<script src="site.js"></script>
</body>
</html>
