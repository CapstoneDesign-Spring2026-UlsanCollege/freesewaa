<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Sewaa — Logout</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="app.html" class="brand">Free Sewaa</a>
    </div>
  </header>

<main>
  <section class="page-hero generic-hero">
    <div class="page-hero__bg logout-hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="page-hero__content wrap">
      <div>
        <p class="eyebrow">ACCOUNT</p>
        <h1 class="page-title">You are ready to<br>sign out.</h1>
        <p class="page-text">Return anytime to continue donating, browsing, or messaging.</p>
      </div>
    </div>
  </section>

  <section class="wrap">
    <div class="form-actions">
      <a href="app.html" class="btn btn-soft">Back Home</a>
      <button class="btn btn-hero" id="logoutNow">Sign Out</button>
    </div>
  </section>
</main>

<script>
document.getElementById('logoutNow').addEventListener('click', async () => {
  try { await fetch('/api/auth/logout', { method: 'POST' }); } catch(e) {}
  localStorage.removeItem('freesewaa-auth');
  localStorage.removeItem('freesewaa-current-user-id');
  window.location.href = 'index.html';
});
</script>
</body>
</html>
