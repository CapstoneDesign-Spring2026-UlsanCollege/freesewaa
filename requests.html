<!DOCTYPE html>
<html lang="en">
<head>

  <title>Free Sewaa — My Requests</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="theme.css" />
</head>
<body data-page="requests">

<header class="site-header">
  <div class="site-header__inner">
    <a href="app.html" class="brand">Free Sewaa</a>
    <nav class="main-nav">
      <a href="app.html" class="nav-link">Home</a>
      <a href="about.html" class="nav-link">About Us</a>
      <a href="donate.html" class="nav-link">Donate</a>
      <a href="browse.html" class="nav-link">Browse</a>
      <a href="donate-us.html" class="nav-link">Donate Us</a>
    </nav>
    <div class="header-actions">
      <a href="notifications.html" class="icon-link"><span class="icon-badge"></span><span>Notifications</span></a>
      <a href="messages.html" class="icon-link"><span class="icon-dot"></span><span>Messages</span></a>
      <div class="settings-dropdown">
        <button class="icon-link settings-trigger active-link" type="button"><span class="icon-gear">⚙</span><span>Settings</span></button>

          <a href="premium.html">Premium Plans</a>
          <a href="profile.html">Personal Information</a>
          <a href="saved.html">Saved Items</a>

      </div>

    <div class="page-hero__content wrap">
      <div>
        <p class="eyebrow reveal">REQUEST WORKFLOW</p>
        <h1 class="page-title reveal reveal-1">Track every request<br>from pending to pickup.</h1>
      </div>
      <div class="page-badge reveal reveal-3">
        <span class="mini-label">REQUEST STATS</span>
        <div class="badge-stat-row" id="requestsStats"></div>
      </div>
    </div>
  </section>

  <section class="wrap request-list" id="requestsGrid"></section>

<script src="site.js"></script>
