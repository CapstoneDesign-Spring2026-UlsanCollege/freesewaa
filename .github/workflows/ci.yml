name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List folders
        run: ls -la

      - name: Count HTML files
        run: echo "HTML: $(ls html/*.html 2>/dev/null | wc -l)"

      - name: Count CSS files
        run: echo "CSS: $(ls css/*.css 2>/dev/null | wc -l)"

      - name: Count JS files
        run: echo "JS: $(ls js/*.js 2>/dev/null | wc -l)"

      - name: Check server folder exists
        run: ls server/

      - name: Check server.js exists
        run: test -f server/server.js && echo "server.js exists" || echo "server.js missing"

      - name: Validate server.js syntax (if exists)
        run: |
          if [ -f server/server.js ]; then
            node --check server/server.js && echo "✅ server.js valid"
          else
            echo "⚠️ server.js not found, skipping validation"
          fi