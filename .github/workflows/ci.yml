name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check folder structure
        run: |
          echo "=== Folder Structure ==="
          ls -la
          echo "=== HTML ==="
          ls html/
          echo "=== CSS ==="
          ls css/
          echo "=== JS ==="
          ls js/
          echo "=== Server ==="
          ls server/

      - name: Install server dependencies
        run: |
          cd server
          npm install --package-lock-only || npm install || true

      - name: Validate server.js syntax
        run: node --check server/server.js

      - name: Count files
        run: |
          echo "HTML files: $(ls html/*.html | wc -l)"
          echo "CSS files: $(ls css/*.css | wc -l)"
          echo "JS files: $(ls js/*.js | wc -l)"
          echo "✅ CI Test Passed"