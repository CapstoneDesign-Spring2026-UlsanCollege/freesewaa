name: CI Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Show structure
        run: ls -la

      - name: Verify folders
        run: |
          echo "Checking folders..."
          test -d html && echo "✓ html/"
          test -d css && echo "✓ css/"
          test -d js && echo "✓ js/"
          test -d server && echo "✓ server/"
          echo "✅ All folders exist"

      - name: Count files
        run: |
          echo "HTML: $(ls html/*.html 2>/dev/null | wc -l | tr -d ' ')"
          echo "CSS: $(ls css/*.css 2>/dev/null | wc -l | tr -d ' ')"
          echo "JS: $(ls js/*.js 2>/dev/null | wc -l | tr -d ' ')"