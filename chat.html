<!DOCTYPE html>
 <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <title>Free Sewaa — Chat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="bg-noise"></div>
    <div class="bg-grid"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <main class="chat-page">
      <div class="container">
        <header class="chat-header glass-card">
          <a href="browse.html" class="back-link">
            <i data-lucide="arrow-left"></i>
            Back to Browse
          </a>

          <div class="chat-header-copy">
            <span class="section-badge">Chat</span>
            <h1 id="chatTitle">Item Chat</h1>
            <p id="chatSubtitle">Talk with the donor about this item.</p>
          </div>
        </header>

        <section class="chat-layout">
          <aside class="chat-item-card glass-card" id="chatItemCard">
            <div class="chat-item-image" id="chatItemImage">📦</div>
            <div class="chat-item-body">
              <h2 id="itemTitle">Item</h2>
              <p id="itemMeta">Location</p>
            </div>
          </aside>

          <section class="chat-panel glass-card">
            <div class="messages" id="messages"></div>

            <form class="chat-input-wrap" id="chatForm">
              <input
                id="msgInput"
                type="text"
                placeholder="Type your message..."
                autocomplete="off"
              />
              <button type="submit" class="send-btn">Send</button>
            </form>
          </section>
        </section>
      </div>
    </main>

    <script src="js/notification.js"></script>
<script src="js/chat.js"></script>
  </body>
</html>
