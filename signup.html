<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Free Sewaa - Sign Up</title>
  <link rel="stylesheet" href="css/style.css">
  <link
  rel="stylesheet"
   href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>
<body>
  <div class="signup-wrapper">
    <div class="signup-card">
      <h1>Create account</h1>
      <p class="subtitle">Join our community of kindness</p>

      <div class="toggle">
        <button class="toggle-btn active" id="signupEmailBtn" type="button">
          <i class="fa-regular fa-envelope"></i>
          <span>Email</span>
        </button>
        <button class="toggle-btn" id="signupPhoneBtn" type="button">
          <i class="fa-solid fa-phone"></i>
          <span>Phone</span>
        </button>
      </div>

      <form class="signup-form" id="signupForm">
        <div id="signupEmailForm">
          <label>Full Name</label>
          <div class="input-box">
            <input type="text" id="fullName" placeholder="John Doe" />
          </div>

          <label>Email Address</label>
          <div class="input-box">
            <i class="fa-regular fa-envelope input-icon left-icon"></i>
            <input type="email" id="signupEmail" placeholder="you@example.com" />
          </div>

          <label>Password</label>
          <div class="input-box">
            <i class="fa-solid fa-lock input-icon left-icon"></i>
            <input type="password" id="signupPassword" placeholder="••••••••" />
            <i
              class="fa-regular fa-eye input-icon right-icon toggle-password"
              data-target="signupPassword"
            ></i>
          </div>

          <label>Confirm Password</label>
          <div class="input-box">
            <i class="fa-solid fa-lock input-icon left-icon"></i>
            <input type="password" id="confirmPassword" placeholder="••••••••" />
            <i
              class="fa-regular fa-eye input-icon right-icon toggle-password"
              data-target="confirmPassword"
            ></i>
          </div>
        </div>

        <div id="signupPhoneForm" class="hidden">
          <label>Full Name</label>
          <div class="input-box">
            <input type="text" id="phoneFullName" placeholder="John Doe" />
          </div>

          <label>Phone Number</label>
          <div class="phone-box">
            <select id="signupCountryCode">
              <option value="+1">US +1</option>
              <option value="+44">UK +44</option>
              <option value="+91">IN +91</option>
              <option value="+82">KR +82</option>
              <option value="+81">JP +81</option>
              <option value="+86">CN +86</option>
              <option value="+977">NP +977</option>
            </select>
            <input type="text" id="signupPhone" placeholder="Phone number" />
          </div>

          <label>Password</label>
          <div class="input-box">
            <i class="fa-solid fa-lock input-icon left-icon"></i>
            <input type="password" id="phoneSignupPassword" placeholder="••••••••" />
            <i
              class="fa-regular fa-eye input-icon right-icon toggle-password"
              data-target="phoneSignupPassword"
            ></i>
          </div>

          <label>Confirm Password</label>
          <div class="input-box">
            <i class="fa-solid fa-lock input-icon left-icon"></i>
            <input type="password" id="phoneConfirmPassword" placeholder="••••••••" />
            <i
              class="fa-regular fa-eye input-icon right-icon toggle-password"
              data-target="phoneConfirmPassword"
            ></i>
          </div>
        </div>

        <button class="create-btn" type="submit">
          <span>Create Account</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

      <div class="divider">
        <span>Or continue with</span>
      </div>

      <div class="social-buttons">
        <button type="button" class="social-btn">
          <i class="fa-brands fa-google"></i>
        </button>
        <button type="button" class="social-btn">
          <i class="fa-brands fa-facebook-f"></i>
        </button>
        <button type="button" class="social-btn">
          <i class="fa-brands fa-instagram"></i>
        </button>
      </div>

      <p class="signin-text">
        Already have an account? <a href="index.html">Sign in</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
